# GitHub PAT used by the fork-sync CronJob to push branches and open PRs on
# the rezuscloud/* fork repos. Scoped to repo + workflow. From Bitwarden.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fork-maintenance-github
  namespace: fork-maintenance
  labels:
    app.kubernetes.io/name: fork-maintenance
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  target:
    template:
      type: Opaque
      data:
        token: "{{ .FORK_MAINTENANCE_GITHUB_TOKEN }}"
  data:
    - secretKey: FORK_MAINTENANCE_GITHUB_TOKEN
      remoteRef:
        key: FORK_MAINTENANCE_GITHUB_TOKEN
